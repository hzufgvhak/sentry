    #   plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
    # # # 所需使用的最大线速度 (m/s)
    #   desired_linear_vel: 2.0
    #    # 当 use_velocity_scaled_lookahead_dist 为 false 时，用于找到超前点的超前距离 (m)
    #   lookahead_dist: 0.6
    # #   # 参数 use_velocity_scaled_lookahead_dist 为 true 时的最小超前距离 (m) 阈值
    #   min_lookahead_dist: 0.3
    # #   # 参数 use_velocity_scaled_lookahead_dist 为 true 时的最大超前距离 (m) 阈值
    #   max_lookahead_dist: 0.9
    # #   # 当 use_velocity_scaled_lookahead_dist 为 true 时，预测速度的时间。也被称为超前增益
    #   lookahead_time: 1.5
    # #   # 如果 use_rotate_to_heading 是 true ，这是使用的角速度
    #   rotate_to_heading_angular_vel: 2.2
    # #   # TF变换公差
    #   transform_tolerance: 0.1
    # #   # 是否使用速度缩放的超前距离或常数 lookahead_distance
    #   use_velocity_scaled_lookahead_dist: false
    # #   # 接近目标时应用的最小速度 (m/s) 阈值，以确保进度。必须是 > 0.01
    #   min_approach_linear_velocity: 0.1
    # #   # 向前投射速度命令以检查碰撞的时间
    #   max_allowed_time_to_collision_up_to_carrot: 1.0
    # #   # 是否对路径曲率使用调节特征 (例如在高曲率路径上运行缓慢)
    #   use_regulated_linear_velocity_scaling: false
    # #   # 是否使用受管制的特征来接近障碍物 (例如，接近障碍物时速度慢)
    #   use_cost_regulated_linear_velocity_scaling: false
    # #   # 当 use_regulated_linear_velocity_scaling 为 true 时，触发调节特征的转弯半径 (m)。记住，更尖锐的转弯半径更小
    #   regulated_linear_scaling_min_radius: 0.4
    # #   # 任何受监管的试探法可以发送的最小速度 (m/s)，以确保即使在具有高曲率的高成本空间中，过程仍然可以实现。必须是 > 0.1
    #   regulated_linear_scaling_min_speed: 0.3
    # #   # 使用完整的planner时，是否能够旋转到粗糙的航向和目标方向。推荐用于所有可以就地旋转的机器人类型。注意: use_rotate_to_heading 和 allow_reversing 不能同时设置为 true ，因为这会导致不明确的情况
    #   use_rotate_to_heading: true
    # #   # 当计划的路径涉及反向 (由方向尖点表示) 时，使机器人能够反向驱动
    #   allow_reversing: false
    # #   # 如果 use_rotate_to_heading 是 true ，路径方向和启动机器人方向 (弧度) 的差异会触发旋转
    #   rotate_to_heading_min_angle: 1.0
    # #   # 如果 use_rotate_to_heading 为 true ，则旋转至航向时的最大允许角加速度 (rad/s)
    #   max_angular_accel: 9.0
    ####################################################################################
      # DWB默认控制器 parameters
      # plugin: "dwb_core::DWBLocalPlanner"
      # debug_trajectory_details: True
      # min_vel_x: 0.0
      # min_vel_y: 0.0
      # max_vel_x: 0.26
      # max_vel_y: 0.0
      # max_vel_theta: 1.0
      # min_speed_xy: 0.0
      # max_speed_xy: 0.26
      # min_speed_theta: 0.0
      # acc_lim_x: 2.5
      # acc_lim_y: 0.0
      # acc_lim_theta: 3.2
      # decel_lim_x: -2.5
      # decel_lim_y: 0.0
      # decel_lim_theta: -3.2
      # vx_samples: 20
      # vy_samples: 5
      # vtheta_samples: 20
      # sim_time: 1.7
      # linear_granularity: 0.05
      # angular_granularity: 0.025
      # transform_tolerance: 0.2
      # xy_goal_tolerance: 0.25
      # trans_stopped_velocity: 0.25
      # short_circuit_trajectory_evaluation: True
      # stateful: True
      # critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      # BaseObstacle.scale: 0.02
      # PathAlign.scale: 32.0
      # GoalAlign.scale: 24.0
      # PathAlign.forward_point_distance: 0.1
      # GoalAlign.forward_point_distance: 0.1
      # PathDist.scale: 32.0
      # GoalDist.scale: 24.0
      # RotateToGoal.scale: 32.0
      # RotateToGoal.slowing_factor: 5.0
      # RotateToGoal.lookahead_time: -1.0
    ################################################################################3333
    FollowPath:
      # =============================================================================
      # >>>>>>>>>>>>>>>>>> 当前启用的局部规划器: TEB <<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<
      # =============================================================================
      # 插件: teb_local_planner::TebLocalPlannerROS
      # 特点: 基于优化的轨迹规划,路径平滑,适合狭窄空间
      # --------------------------------------------------------------------------------
      # 切换方法:
      #   TEB -> RPP: 注释下方 TEB 配置,取消注释 RPP 配置
      #   TEB -> DWB: 注释下方 TEB 配置,取消注释 DWB 配置
      # =============================================================================
      plugin: "teb_local_planner::TebLocalPlannerROS"
      
    #   # ============================================================================
    #   轨迹配置 (Trajectory Configuration)
    #   控制轨迹的时间分辨率和采样
    #   ============================================================================
      teb_autosize: 1.0              # 自动调整轨迹点数量: 1=启用,0=禁用
      dt_ref: 0.4                     # 轨迹时间分辨率(秒): 越小越精确,但计算量越大.建议0.3-0.5
      dt_hysteresis: 0.1              # 时间滞后: 允许dt的波动范围,避免频繁调整
      max_samples: 300                # 最大采样点数: 减少到300以提高性能(原500)
      global_plan_overwrite_orientation: False  # 是否覆盖全局路径方向: False保持原方向
      allow_init_with_backwards_motion: False  # 允许初始反向运动: 差速轮机器人建议False
      max_global_plan_lookahead_dist: 1.8       # 全局路径前瞻距离(米): 减小到1.8提高响应速度(原3.0)
      global_plan_viapoint_sep: 0.3  # 途经点间隔: 途经点之间的最小距离
      global_plan_prune_distance: 1.0 # 路径裁剪距离: 裁剪已过路径的阈值
      exact_arc_length: False         # 精确弧长计算: False使用近似计算,更快
      feasibility_check_no_poses: 2   # 可行性检查: 规划前检查的前向pose数
      publish_feedback: False         # 发布反馈: 调试用,生产环境关闭
          
    #   # ============================================================================
    #   机器人运动学参数 (Robot Kinematics)
    #   必须与实际机器人参数匹配
    #   ============================================================================
      max_vel_x: 3.0                 # 最大线速度(m/s): 机器人最大前进速度
      max_vel_x_backwards: 0.2       # 最大倒车速度(m/s): 通常为前进速度的50-80%
      max_vel_theta: 1.0              # 最大角速度(rad/s): 机器人最大旋转速度
      acc_lim_x: 2.5                 # 线加速度限制(m/s²): 避免急加速
      acc_lim_theta: 3.2              # 角加速度限制(rad/s²): 避免急转弯

    #   # 机器人footprint模型配置
    #   # circular: 圆形模型,只需提供半径
    #   # point: 点模型
    #   # polygon: 多边形模型,需提供顶点
      footprint_model:
       type: "circular"               # Footprint类型: circular(圆形)/point/polygon
       radius: 0.17                   # 机器人圆形半径(米): 必须大于实际机器人

    #   # ============================================================================
    #   目标容差 (Goal Tolerance)
    #   到达目标点时的允许误差
    #   ============================================================================
      xy_goal_tolerance: 0.25          # 位置容差(米): 到达目标点xy的允许误差
      yaw_goal_tolerance: 0.25         # 角度容差(弧度): 到达目标点的允许方向误差
      free_goal_vel: False             # 目标点是否允许速度: False=到达前减速到0
          
    #   # ============================================================================
    #   障碍物参数 (Obstacle Configuration)
    #   控制避障行为和敏感度
    #   ============================================================================
      min_obstacle_dist: 0.27          # 最小障碍物距离(米): 必须小于inflation_dist
      inflation_dist: 0.6               # 障碍物膨胀距离(米): 障碍物周围的安全区域
      include_costmap_obstacles: True   # 从代价地图获取障碍物: True使用local_costmap
      costmap_obstacles_behind_robot_dist: 1.0  # 机器人后方障碍物检测距离
      obstacle_poses_affected: 15       # 考虑的障碍物数量: 过多会影响性能
      
    #   # 动态障碍物处理
      dynamic_obstacle_inflation_dist: 0.6  # 动态障碍物膨胀距离
      include_dynamic_obstacles: True       # 是否考虑动态障碍物(如其他机器人)

    #   # 代价地图转换器配置
    #   # costmap_converter: 将costmap转换为多边形,提高障碍物检测精度
    #   # 如果不启动costmap_converter节点,可设为空字符串""
      costmap_converter_plugin: "costmap_converter::CostmapToPolygonsDBSMCCH"
      costmap_converter_spin_thread: True   # 是否使用独立线程处理
      costmap_converter_rate: 5              # 转换器处理频率(Hz)

    #   # ============================================================================
    #   优化参数 (Optimization Parameters)
    #   控制轨迹优化的行为和收敛速度
    #   ============================================================================
      no_inner_iterations: 5            # 内层迭代次数: 每个采样点的优化次数
      no_outer_iterations: 4            # 外层迭代次数: 整个轨迹的优化循环次数
      optimization_activate: True        # 启用优化: True
      optimization_verbose: False       # 详细输出: 调试用,生产关闭
      penalty_epsilon: 0.1              # 惩罚epsilon: 增加安全边际
      obstacle_cost_exponent: 4.0       # 障碍物成本指数: 越大对近距离障碍物越敏感
      
    #   # 权重分配 (Weight Configuration) - 这是调优的核心
    #   # 权重越大,该目标越重要,但可能导致其他目标被忽视
      weight_max_vel_x: 2.0             # 线速度权重: 限制最大速度的重要程度
      weight_max_vel_theta: 1.0         # 角速度权重: 限制最大角速度的重要程度
      weight_acc_lim_x: 1.0             # 线加速度权重: 限制加速度的重要程度
      weight_acc_lim_theta: 1.0        # 角加速度权重: 限制角加速度的重要程度
      weight_kinematics_nh: 1000.0     # 运动学权重(非完整约束): 极高,确保运动学可行
      weight_kinematics_forward_drive: 3.0  # 前进权重: 强制机器人尽量向前行驶
      weight_kinematics_turning_radius: 1.0  # 转弯半径权重: 限制最小转弯半径
      weight_optimaltime: 1.0          # 时间最优权重: 越小越平滑,越大越快到达
      weight_shortest_path: 0.0        # 最短路径权重: 0表示不考虑,增大可能偏离全局路径
      weight_obstacle: 70.0             # 障碍物避让权重: 很高,确保安全
      weight_inflation: 0.2             # 膨胀权重: 控制与障碍物的安全距离
      weight_dynamic_obstacle: 10.0     # 动态障碍物权重
      weight_dynamic_obstacle_inflation: 0.2  # 动态障碍物膨胀权重
      weight_viapoint: 40.0            # 途经点权重: 确保跟随全局路径
      weight_adapt_factor: 2.0          # 自适应因子: 迭代时权重调整系数

    #   # ============================================================================
    #   同伦类规划器 (Homotopy Class Planner)
    #   并行规划多条路径,选择最优解
    #   对复杂环境很有用,但会增加计算量
    #   ============================================================================
      enable_homotopy_class_planning: True   # 启用多路径规划: 寻找绕过障碍物的不同路径
      enable_multithreading: True             # 多线程: 提高规划速度
      max_number_classes: 4                 # 最大路径数: 同时考虑的最优路径数量
      selection_cost_hysteresis: 1.0         # 成本滞后: 路径切换的阈值
      selection_prefer_initial_plan: 0.95    # 偏好初始规划: 保持路径稳定
      selection_obst_cost_scale: 1.0         # 障碍物成本缩放
      selection_alternative_time_cost: True  # 备选时间成本: 使用时间作为成本

      roadmap_graph_no_samples: 15           # 采样图样本数
      roadmap_graph_area_width: 5.0          # 采样区域宽度
      roadmap_graph_area_length_scale: 1.0   # 采样区域长度缩放
      h_signature_prescaler: 0.5             # H签名缩放
      h_signature_threshold: 0.1              # H签名阈值
      obstacle_heading_threshold: 0.45        # 障碍物方向阈值
      switching_blocking_period: 0.0          # 路径切换阻塞时间
      viapoints_all_candidates: True          # 所有候选路径的途经点
      delete_detours_backwards: True         # 删除绕远路径
      max_ratio_detours_duration_best_duration: 3.0  # 绕远路径阈值
      visualize_hc_graph: True               # 可视化: 调试用

    #   # ============================================================================
    #   恢复行为 (Recovery Behaviors)
    #   当规划失败时的处理策略
    #   ============================================================================
      shrink_horizon_backup: True         # 收缩预测范围备份: 当不稳定时缩短规划范围
      shrink_horizon_min_duration: 10.0  # 收缩最短持续时间
      oscillation_recovery: True          # 震荡恢复: 检测并解决震荡问题
      oscillation_v_eps: 0.1              # 速度震荡阈值
      oscillation_omega_eps: 0.1         # 角速度震荡阈值
      oscillation_recovery_min_duration: 10.0  # 震荡恢复最短时间
      oscillation_filter_duration: 10.0   # 震荡过滤持续时间

    ###############################################################################################
# 局部代价地图
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: false
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      # 机器人半径
      robot_radius: 0.44
      plugins: ["voxel_layer", "inflation_layer"]
      # 碰撞层(膨胀层,用于防撞)
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        # 碰撞层半径
        inflation_radius: 0.1 #change1
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0  #change2
        mark_threshold: 3
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      always_send_full_costmap: True

# 全局代价地图
global_costmap:
  global_costmap:
    ros__parameters:
      # 代价地图更新频率
      update_frequency: 1.0
      # 将costmap发布到主题的频率
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: false
      # 机器人半径
      robot_radius: 0.36
      # 成本图1像素的分辨率(米)
      resolution: 0.05
      # 如果为false，则将未知空间视为自由空间，否则将视为未知空间
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        # 传感器来源列表
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      # 碰撞层(膨胀层,用于防撞)
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        # 碰撞层半径
        inflation_radius: 0.5
      # 是否每次更新都发送完整的成本图，而不是更新
      always_send_full_costmap: True

# 处理堆栈的地图加载请求并托管地图主题的服务
map_server:
  ros__parameters:
    use_sim_time: false
    # Overridden in launch by the "map" launch configuration or provided default value.
    # To use in yaml, remove the default "map" value in the tb3_simulation_launch.py file & provide full path to map below.
    yaml_filename: ""

# 地图保存服务
map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

# 规划服务器
planner_server:
  ros__parameters:
    # 预期planner频率。如果当前频率小于预期频率，则显示警告消息。
    expected_planner_frequency: 20.0
    use_sim_time: false
    # 参数和处理请求的映射插件名称列表
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      # 是否允许在未知空间进行规划
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    use_sim_time: false
    simulate_ahead_time: 2.0
    max_rotational_vel: 2.2
    min_rotational_vel: 0.4
    rotational_acc_lim: 9.0

# 恢复服务器
recoveries_server:
  ros__parameters:
    # 用于碰撞检查的原始成本图主题
    costmap_topic: local_costmap/costmap_raw
    # costmap框架中足迹的主题
    footprint_topic: local_costmap/published_footprint
    # 运行恢复插件的频率
    cycle_frequency: 20.0
    # 要使用的插件名称列表，也与操作服务器名称匹配
    recovery_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_recoveries/Spin"
    backup:
      plugin: "nav2_recoveries/BackUp"
    wait:
      plugin: "nav2_recoveries/Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_timeout: 0.1
    # 是时候展望未来的碰撞了
    simulate_ahead_time: 2.0
    # 最大旋转速度 (rad/s)
    max_rotational_vel: 2.0
    # 最小旋转速度 (rad/s)
    min_rotational_vel: 0.4
    # 最大旋转加速度 (rad/s ^ 2)
    rotational_acc_lim: 3.2

robot_state_publisher:
  ros__parameters:
    use_sim_time: false

# 使用导航操作服务器执行路点追踪
waypoint_follower:
  ros__parameters:
    use_sim_time: false
    # 检查当前导航任务结果的速率
    loop_rate: 20
    # 如果单个航点失败，是否失败。如果为false，将继续前往下一个航路点
    stop_on_failure: false
    # 一个插件，用于定义机器人到达航路点时要执行的任务
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

# 调整速度
velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.75, 0.75, 2.2]
    min_velocity: [-0.26, 0.0, -1.0]
    max_accel: [1.8, 1.8, 9.0]
    max_decel: [-2.5, 0.0, -3.2]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0





