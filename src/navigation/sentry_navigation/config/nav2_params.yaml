#       # =============================================================================
#       # 插件: nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController
#       # 特点: 几何追踪算法,计算快,适合高速简单路径
#       # --------------------------------------------------------------------------------
#       # 切换方法:
#       #   1. 注释掉上方 TEB 的整个 FollowPath 节 (包括 plugin 行)
#       #   2. 取消注释下方的 RPP FollowPath 节
#       #   3. 重启 navigation 节点
#       # =============================================================================
#       plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
#       #plugin: "teb_local_planner/TebLocalPlannerROS2"

#       # --- 基础速度参数 ---
#       desired_linear_vel: 2.0           # 期望线速度(m/s): 机器人期望的最大前进速度
#       lookahead_dist: 0.6               # 前看距离(米): 追踪路径上距离机器人的目标点
#       min_lookahead_dist: 0.3          # 最小前看距离(米): 低速时的前看距离
#       max_lookahead_dist: 0.9          # 最大前看距离(米): 高速时的前看距离
#       lookahead_time: 1.5                # 前看时间(秒): 基于时间的前看计算

#       # --- 旋转控制 ---
#       rotate_to_heading_angular_vel: 2.2  # 旋转角速度(rad/s): 旋转到目标方向时的速度
#       use_rotate_to_heading: true       # 是否旋转到朝向: 到达目标前旋转朝向
#       rotate_to_heading_min_angle: 1.0  # 最小旋转角度(弧度): 触发旋转的最小角度差
#       max_angular_accel: 9.0            # 最大角加速度(rad/s²): 旋转时的加速度限制
#       allow_reversing: false            # 允许倒车: false=禁止, true=允许倒退行驶

#       # --- 速度调节 ---
#       use_velocity_scaled_lookahead_dist: false  # 使用速度缩放前看距离
#       use_regulated_linear_velocity_scaling: false  # 使用路径曲率速度调节
#       use_cost_regulated_linear_velocity_scaling: false  # 使用代价地图速度调节
#       regulated_linear_scaling_min_radius: 0.4  # 调节生效的最小转弯半径
#       regulated_linear_scaling_min_speed: 0.3  # 调节时的最小速度

#       # --- 接近目标 ---
#       min_approach_linear_velocity: 0.1  # 接近目标时的最小速度
#       max_allowed_time_to_collision_up_to_carrot: 1.0  # 碰撞检测时间

#       # --- 容差与限制 ---
#       transform_tolerance: 0.1         # TF变换容差(秒)
#       xy_goal_tolerance: 0.25           # 目标位置容差(米)
#       yaw_goal_tolerance: 0.25          # 目标角度容差(弧度)

#       # =============================================================================
#       # >>>>>>>>>>>>>>>>>> 备用局部规划器 3: DWB <<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<
#       # =============================================================================
#       # 插件: dwb_core::DWBLocalPlanner
#       # 特点: 基于DWA/DWB算法,采样速度空间评估轨迹,经典但效果一般
#       # --------------------------------------------------------------------------------
#       # 切换方法:
#       #   1. 注释掉上方 TEB 的整个 FollowPath 节
#       #   2. 取消注释下方的 DWB 配置节
#       #   3. 重启 navigation 节点
#       # 注意事项: DWB 效果通常不如 RPP,不推荐使用
#       # =============================================================================
#       # plugin: "dwb_core::DWBLocalPlanner"
#       # debug_trajectory_details: True
#       # min_vel_x: 0.0
#       # min_vel_y: 0.0
#       # max_vel_x: 0.26
#       # max_vel_y: 0.0
#       # max_vel_theta: 1.0
#       # min_speed_xy: 0.0
#       # max_speed_xy: 0.26
#       # min_speed_theta: 0.0
#       # acc_lim_x: 2.5
#       # acc_lim_y: 0.0
#       # acc_lim_theta: 3.2
#       # decel_lim_x: -2.5
#       # decel_lim_y: 0.0
#       # decel_lim_theta: -3.2
#       # vx_samples: 20
#       # vy_samples: 5
#       # vtheta_samples: 20
#       # sim_time: 1.7
#       # linear_granularity: 0.05
#       # angular_granularity: 0.025
#       # transform_tolerance: 0.2
#       # xy_goal_tolerance: 0.25
#       # trans_stopped_velocity: 0.25
#       # short_circuit_trajectory_evaluation: True
#       # stateful: True
#       # critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
#       # BaseObstacle.scale: 0.02
#       # PathAlign.scale: 32.0
#       # GoalAlign.scale: 24.0
#       # PathAlign.forward_point_distance: 0.1
#       # GoalAlign.forward_point_distance: 0.1
#       # PathDist.scale: 32.0
#       # GoalDist.scale: 24.0
#       # RotateToGoal.scale: 32.0
#       # RotateToGoal.slowing_factor: 5.0
#       # RotateToGoal.lookahead_time: -1.0

