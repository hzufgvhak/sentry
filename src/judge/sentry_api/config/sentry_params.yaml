# config/sentry_params.yaml
# 哨兵机器人决策节点参数配置
# 对应代码：RobotDecisionNode.declare_parameter()

robot_decision_node:
  ros__parameters:
    
    # ==================== 巡逻路径配置 ====================
    # 巡逻点坐标 (x, y)，按顺序访问，最后一点到达后进入进攻状态
    # 建议：根据实际场地地图调整，确保在Nav2 costmap范围内
    patrol_points: [[1.0, 1.0], [4.5, 1.2], [4.5, 0.1]]
    
    # 家（出生点/补给点）位置，血量低时返回此处
    home_position: [0.0, 0.0]
    
    # ==================== 血量决策阈值 ====================
    # 低血量阈值：低于此值强制回家（必须小于高阈值）
    hp_threshold_low: 100
    
    # 高血量阈值：高于此值才可出家巡逻
    hp_threshold_high: 300
    
    # ==================== 时间参数 ====================
    # 在家最小停留时间（秒），防止频繁进出
    stay_home_interval: 10.0
    
    # 单点导航超时时间（秒），超过则强制取消
    nav_timeout: 30.0
    
    # ==================== 导航精度 ====================
    # 到家判定距离误差（米），TF距离小于此值视为到达
    home_tolerance: 0.5
    
    # ==================== 姿态广播 ====================
    # 姿态状态广播间隔（秒），确保下位机收到心跳
    pose_broadcast_interval: 0.5
    
    # ==================== 进攻状态参数 ====================
    # 进攻持续时间（秒），到达最后一点后的进攻时间
    attack_duration: 10.0
    
    # 攻击位置容差（米），偏离超过此值自动重定位
    attack_position_tolerance: 1.0
    
    # 攻击状态TF检查间隔（秒），降低查询频率节省资源
    attack_tf_check_interval: 0.2